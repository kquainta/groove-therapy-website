<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }} | Groove Therapy Business Plan</title>
<link rel="icon" type="image/png" href="/static/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  background: #0a0a0f;
  color: #d4cfc6;
  line-height: 1.8;
}
a { color: #c9a84c; text-decoration: none; transition: color 0.3s; }
a:hover { color: #e8c86c; }

/* Navigation */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 1000;
  background: rgba(10,10,15,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  padding: 0 24px;
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 70px;
}
.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.3em;
  color: #c9a84c;
  letter-spacing: 1px;
}
.nav-links { display: flex; gap: 20px; list-style: none; }
.nav-links a {
  color: #a09880;
  font-size: 0.85em;
  font-weight: 400;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.nav-links a:hover { color: #c9a84c; }
.nav-back {
  background: rgba(201,168,76,0.1);
  color: #c9a84c !important;
  padding: 8px 16px;
  border-radius: 4px;
  font-size: 0.8em;
}
.nav-back:hover { background: rgba(201,168,76,0.2); }

/* Main content */
.doc-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
}

header {
  margin-top: 70px;
  padding: 60px 0;
  background: linear-gradient(135deg, #0a0a18 0%, #1a1020 30%, #0f0a1a 70%, #0a0a0f 100%);
  border-bottom: 1px solid rgba(201,168,76,0.15);
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.5em;
  color: #e8e0d0;
  margin-bottom: 0.3em;
  line-height: 1.2;
}
header p {
  color: #a09880;
  font-size: 0.95em;
}

main {
  padding: 60px 0;
}

/* Markdown content styles */
.doc-content h1,
.doc-content h2,
.doc-content h3,
.doc-content h4,
.doc-content h5,
.doc-content h6 {
  font-family: 'Playfair Display', serif;
  color: #e8e0d0;
  margin-top: 1.5em;
  margin-bottom: 0.5em;
  line-height: 1.3;
}
.doc-content h1 { font-size: 2em; }
.doc-content h2 { font-size: 1.8em; border-bottom: 1px solid rgba(201,168,76,0.2); padding-bottom: 0.3em; }
.doc-content h3 { font-size: 1.4em; color: #c9a84c; }
.doc-content h4 { font-size: 1.2em; }

.doc-content p {
  margin-bottom: 1.2em;
  color: #b0a890;
}

.doc-content ul,
.doc-content ol {
  margin: 1.2em 0 1.2em 2em;
  color: #b0a890;
}
.doc-content li {
  margin-bottom: 0.6em;
}

.doc-content code {
  background: rgba(201,168,76,0.1);
  color: #c9a84c;
  padding: 2px 6px;
  border-radius: 3px;
  font-family: 'Monaco', 'Courier New', monospace;
  font-size: 0.9em;
}

.doc-content pre {
  background: #12121a;
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 6px;
  padding: 16px;
  margin: 1.5em 0;
  overflow-x: auto;
}

.doc-content pre code {
  background: none;
  color: #c9a84c;
  padding: 0;
  font-size: 0.9em;
  display: block;
}

.doc-content blockquote {
  border-left: 4px solid #c9a84c;
  padding-left: 16px;
  margin: 1.5em 0;
  color: #908870;
  font-style: italic;
}

.doc-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 1.5em 0;
  font-size: 0.95em;
}
.doc-content table th {
  background: rgba(201,168,76,0.1);
  color: #c9a84c;
  padding: 12px;
  text-align: left;
  border-bottom: 2px solid rgba(201,168,76,0.2);
  font-weight: 600;
}
.doc-content table td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(201,168,76,0.1);
  color: #b0a890;
}
.doc-content table tr:hover {
  background: rgba(201,168,76,0.05);
}

.doc-content strong {
  color: #e8e0d0;
  font-weight: 600;
}

.doc-content em {
  color: #c9a84c;
  font-style: italic;
}

/* Divider */
.doc-content hr {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
  margin: 2em 0;
}

/* Back to index */
.back-to-plan {
  display: inline-block;
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.2);
  color: #c9a84c;
  padding: 12px 20px;
  border-radius: 6px;
  font-size: 0.9em;
  font-weight: 500;
  margin-bottom: 40px;
  transition: background 0.3s;
}
.back-to-plan:hover {
  background: rgba(201,168,76,0.2);
}

/* Footer */
footer {
  background: #06060a;
  border-top: 1px solid rgba(201,168,76,0.1);
  padding: 40px 0;
  text-align: center;
  color: #605840;
  font-size: 0.85em;
}

/* Responsive */
@media (max-width: 768px) {
  header h1 { font-size: 1.8em; }
  .doc-content h2 { font-size: 1.4em; }
  nav { padding: 0 12px; }
  .doc-container { padding: 0 12px; }
  header { padding: 40px 0; }
  main { padding: 40px 0; }
}
</style>
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">Groove Therapy</a>
    <ul class="nav-links">
      <li><a href="/bplan" class="nav-back">← Back to Plan</a></li>
    </ul>
  </div>
</nav>

<!-- Header -->
<header>
  <div class="doc-container">
    <h1>Business Plan</h1>
    <p>12-Month Growth Strategy for Groove Therapy</p>
  </div>
</header>

<!-- Main Content -->
<main>
  <div class="doc-container">
    <a href="/bplan" class="back-to-plan">← Back to all documents</a>
    <article class="doc-content">
      {{ content|safe }}
    </article>
  </div>
</main>

<!-- Footer -->
<footer>
  <div class="doc-container">
    <p>Groove Therapy Business Plan &middot; <a href="/bplan">View all documents</a></p>
  </div>
</footer>

</body>
</html>
